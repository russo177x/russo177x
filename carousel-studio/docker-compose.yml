version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY-}
      - OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - ./backend/exports:/app/exports

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
